name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      A2A_SETTLEMENT_TAG: v0.1.0
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install "git+https://github.com/a2a-settlement/a2a-settlement.git@${A2A_SETTLEMENT_TAG}"
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=crewai_a2a_settlement --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Lint
        run: ruff check crewai_a2a_settlement/ tests/
